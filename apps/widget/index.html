<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botty Widget - Test Page</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #1e293b;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { margin-top: 0; }
        p { color: #64748b; line-height: 1.6; }
        .badge {
            background: #5d5dff;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Botty AI Widget <span class="badge">PRO</span></h1>
        <p>
            Welcome to the local test environment. The widget is embedded using the Shadow DOM 
            isolation pattern to ensure it doesn't conflict with this page's styles.
        </p>
        <p>
            Click the icon in the bottom right to start chatting with <strong>Welcome Bot</strong>.
        </p>
    </div>

    <!-- The Widget Entry -->
    <my-ai-agent agent-id="default-agent"></my-ai-agent>

    <!-- Vite Dev Script -->
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
